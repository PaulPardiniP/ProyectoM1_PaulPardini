<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly</title>
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
       <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
       <link href="https://fonts.googleapis.com/css2?family=Stalemate&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="./css/reset.css">
        <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header>  
       <div class="header-">  
            <h1 class="titlemain"> Colorfly Studio </h1>

            <h2 class="subtitle"> Expertos en branding para tu negocio </h2>
       </div> 
    </header>
     
    <main>
        <section class="business">
            <div> 
                <h3> Producimos propuestas visuales para más de 300 clientes en todo el país</h3>
            </div>
            
            <div>
                <img class="mundo" src="/img/world.png" alt="logo">
            </div>
        </section>

        <section class="test-color">
            <h3> Prueba en tiempo real </h3>
            <p> Los colores que más se adaptan a tu empresa </p>
            <button id="btnmain">Combinar</button>
        </section>

        <section id="color-on">
            <p> Seleccionar colores </p>
            <label for="palette-size"> Seleccionar cantidad de colores </label>
            <select id="palette-size">
                <option value="6"> 6 colores </option>
                <option value="8"> 8 colores </option>
                <option value="9"> 9 colores </option>
        </select>

            <button id="actionbtn">Generar paleta</button>
    
        <section class="color-yes">
            
        </section>

        <p id="feedback-m"> Combination generated </p>
        </section>
    </main>

    <script src="/script/index.js"> </script>
</body>
</html>
